<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOA Caption Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<style>
:root{--navy:#11364d;--red:#bf2a25;--blue:#4c8db8;--white:#fff;--dim:#7aa8c4;--gold:#ffd060;--green:#4ecf7a;--navy-lite:rgba(255,255,255,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999}
.wrap{max-width:860px;margin:0 auto;padding:24px 18px 48px}

/* HEADER */
.hdr{text-align:center;margin-bottom:24px}
.hdr-sub{font-size:11px;font-weight:700;font-style:italic;letter-spacing:3px;color:var(--blue);text-transform:uppercase;margin-bottom:6px}
.hdr h1{font-size:clamp(20px,5vw,36px);font-weight:900;letter-spacing:4px;text-transform:uppercase;line-height:1.1}
.hdr h1 em{color:var(--red);font-style:normal}
.stripes{display:flex;gap:4px;justify-content:center;margin-top:10px}
.stripes div{height:4px;border-radius:2px}
.s1{width:80px;background:var(--red)}.s2{width:60px;background:var(--blue)}.s3{width:40px;background:rgba(255,255,255,0.3)}

/* SPIN BUTTON */
.spin-btn{width:100%;background:var(--red);border:none;border-radius:10px;padding:15px;color:#fff;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.15s;margin-bottom:18px}
.spin-btn:hover:not(:disabled){background:#d4302a;transform:translateY(-1px)}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* SPIN CARD */
.spin-card{background:var(--navy-lite);border:1.5px solid var(--blue);border-radius:14px;padding:18px 20px;margin-bottom:18px;display:none}
.spin-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.spin-band{font-weight:900;font-style:italic;font-size:clamp(16px,3.5vw,24px);line-height:1.15;margin-bottom:2px}
.spin-meta{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.spin-meta b{color:var(--blue)}
.spin-overall{display:flex;gap:14px;align-items:baseline;margin-bottom:14px;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:7px;border-left:3px solid var(--blue)}
.spin-overall-score{font-size:22px;font-weight:900;color:var(--white)}
.spin-overall-place{font-size:13px;font-weight:700;color:var(--blue)}
.spin-overall-event{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase}

/* CAPTION PICK GRID */
.cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cap-btn{background:rgba(255,255,255,0.05);border:1.5px solid rgba(76,141,184,0.35);border-radius:9px;padding:11px 8px 9px;cursor:pointer;transition:.15s;text-align:center;font-family:'Montserrat',sans-serif}
.cap-btn:hover:not(:disabled):not(.is-filled){background:rgba(76,141,184,0.18);border-color:var(--blue)}
.cap-btn:disabled{opacity:.28;cursor:not-allowed}
.cap-btn.is-filled{border-color:rgba(191,42,37,0.35);background:rgba(191,42,37,0.05);cursor:not-allowed}
.cap-name-full{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-bottom:5px;line-height:1.3;font-style:italic}
.cap-rank-num{font-size:26px;font-weight:900;line-height:1;color:var(--white)}
.cap-rank-num.gold{color:var(--gold)}
.cap-rank-num.green{color:var(--green)}
.cap-filled-tag{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--red);text-transform:uppercase;margin-top:3px}

/* RESPIN ROW */
.respin-row{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.respin-btn{flex:1;min-width:140px;background:transparent;border:1.5px solid rgba(255,255,255,0.2);border-radius:8px;padding:9px 10px;color:#fff;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
.respin-btn:hover:not(:disabled){border-color:var(--blue);background:rgba(76,141,184,0.12)}
.respin-btn:disabled{opacity:.25;cursor:not-allowed}
.rs-count{background:rgba(255,255,255,0.12);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700}
.rs-count.used{background:rgba(191,42,37,0.25);color:#ff9999}

/* IDLE */
.idle{text-align:center;padding:28px;color:rgba(255,255,255,0.22);font-size:13px;font-style:italic;border:1.5px dashed rgba(255,255,255,0.1);border-radius:14px;margin-bottom:18px}

/* ROSTER */
.section-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
.roster-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px}
.slot{background:rgba(255,255,255,0.03);border:1.5px dashed rgba(76,141,184,0.25);border-radius:10px;padding:12px 14px;min-height:70px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;transition:.2s}
.slot.filled{background:rgba(76,141,184,0.07);border-style:solid;border-color:rgba(76,141,184,0.45)}
.slot-left{display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}
.slot-cap{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:3px}
.slot-band{font-weight:700;font-style:italic;font-size:12px;line-height:1.25}
.slot-year{font-size:11px;font-weight:700;color:var(--dim);margin-top:2px}
.slot-empty{font-size:11px;color:rgba(255,255,255,0.18);font-style:italic}
.slot-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:3px}
.slot-rank{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;white-space:nowrap}
.slot-score{font-size:18px;font-weight:900;color:var(--white);line-height:1}

/* SCORE BOARD */
.score-board{display:none}
.score-board.on{display:block}
.score-header{background:rgba(255,255,255,0.03);border:1.5px solid var(--red);border-radius:14px;padding:22px;text-align:center;margin-bottom:16px}
.score-lbl{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.score-big{font-size:clamp(40px,9vw,62px);font-weight:900;line-height:1;margin-bottom:16px}

/* 6 SCORE CARDS */
.score-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(76,141,184,0.25);border-radius:11px;padding:14px 12px}
.sc-card.total-ge{border-color:rgba(76,141,184,0.5);background:rgba(76,141,184,0.08)}
.sc-card.total-score{border-color:var(--red);background:rgba(191,42,37,0.08)}
.sc-title{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-bottom:8px;text-transform:uppercase}
.sc-val{font-size:22px;font-weight:900;color:var(--white);margin-bottom:8px}
.sc-card.total-ge .sc-val{color:var(--blue)}
.sc-card.total-score .sc-val{color:var(--red)}


/* SIMULATION */
.sim-card{background:rgba(255,255,255,0.03);border:1.5px solid rgba(76,141,184,0.3);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.sim-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:10px}
.sim-result-lbl{font-size:13px;font-weight:700;color:var(--white);margin-bottom:4px}
.sim-result-sub{font-size:11px;color:var(--dim);font-style:italic;margin-bottom:12px}
.sim-bars{display:flex;flex-direction:column;gap:5px}
.sim-row{display:flex;align-items:center;gap:8px}
.sim-place{font-size:11px;font-weight:700;color:var(--dim);min-width:32px;text-align:right}
.sim-bar-wrap{flex:1;height:16px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.sim-bar{height:100%;border-radius:4px;transition:width .6s ease;background:rgba(76,141,184,0.45)}
.sim-bar.hi{background:var(--red)}
.sim-pct{font-size:11px;font-weight:700;color:var(--dim);min-width:36px}

.play-again{display:block;margin:0 auto;background:transparent;border:1.5px solid var(--red);border-radius:8px;padding:10px 32px;color:var(--red);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.15s}
.play-again:hover{background:var(--red);color:#fff}

@media(max-width:520px){
  .cap-grid{grid-template-columns:repeat(2,1fr)}
  .roster-grid{grid-template-columns:1fr}
  .score-cards{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

const CAPTIONS=[
  {key:'MPI',    full:'Music Performance Individual',   group:'music'},
  {key:'MPE',    full:'Music Performance Ensemble',     group:'music'},
  {key:'VPI',    full:'Visual Performance Individual',  group:'visual'},
  {key:'VPE',    full:'Visual Performance Ensemble',    group:'visual'},
  {key:'MGE Tot',full:'Music General Effect',           group:'mge'},
  {key:'VGE',    full:'Visual General Effect',          group:'vge'}
];

let roster={},currentSpin=null,respinBandUsed=false,respinYearUsed=false,gameOver=false;

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function rankClass(r){return r===1?'gold':r<=3?'green':''}
function ordinal(n){var s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}

function doSpin(){
  if(gameOver)return;
  if(currentSpin){
    alert('Pick a caption from the current spin before spinning again.');
    return;
  }
  currentSpin=rand(DATA);
  renderSpin();
}
function doRespinBand(){
  if(respinBandUsed||!currentSpin)return;
  var pool=DATA.filter(function(d){return d.year===currentSpin.year&&d.band!==currentSpin.band});
  if(!pool.length)return;
  currentSpin=rand(pool);
  respinBandUsed=true;
  renderSpin();
}
function doRespinYear(){
  if(respinYearUsed||!currentSpin)return;
  var pool=DATA.filter(function(d){return d.band===currentSpin.band&&d.year!==currentSpin.year});
  if(!pool.length)return;
  currentSpin=rand(pool);
  respinYearUsed=true;
  renderSpin();
}

function renderSpin(){
  if(!currentSpin)return;
  document.getElementById('idle').style.display='none';
  document.getElementById('spinCard').style.display='block';
  document.getElementById('spinBtn').textContent='\u21BA  SPIN AGAIN';
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinBand').textContent=currentSpin.band;
  document.getElementById('spinMeta').innerHTML=currentSpin.year+'&nbsp;&middot;&nbsp;Class '+currentSpin.class;

  var placeStr=currentSpin.place?ordinal(currentSpin.place)+' place':'—';
  document.getElementById('spinOverall').innerHTML=
    '<span class="spin-overall-score">'+currentSpin.total.toFixed(3)+'</span>'+
    '<span class="spin-overall-place">'+placeStr+'</span>'+
    '<span class="spin-overall-event">'+currentSpin.round+'</span>';

  var grid=document.getElementById('capGrid');
  grid.innerHTML='';
  CAPTIONS.forEach(function(c){
    var rank=currentSpin.rankings[c.key];
    var filled=c.key in roster;
    var btn=document.createElement('button');
    btn.className='cap-btn'+(filled?' is-filled':'');
    btn.disabled=filled;
    var rc=filled?'':rankClass(rank);
    btn.innerHTML='<div class="cap-name-full">'+c.full+'</div><div class="cap-rank-num '+rc+'">'+rank+'</div>'+(filled?'<div class="cap-filled-tag">Filled</div>':'');
    if(!filled){(function(k){btn.onclick=function(){assignCap(k)}})(c.key);}
    grid.appendChild(btn);
  });

  document.getElementById('rsBandBtn').disabled=respinBandUsed;
  document.getElementById('rsYearBtn').disabled=respinYearUsed;
  var rbCt=document.getElementById('rsBandCt');
  rbCt.textContent=respinBandUsed?'used':'1 left';
  rbCt.className='rs-count'+(respinBandUsed?' used':'');
  var ryCt=document.getElementById('rsYearCt');
  ryCt.textContent=respinYearUsed?'used':'1 left';
  ryCt.className='rs-count'+(respinYearUsed?' used':'');
}

function assignCap(key){
  if(!currentSpin||key in roster)return;
  roster[key]={band:currentSpin.band,year:currentSpin.year,score:currentSpin.scores[key],rank:currentSpin.rankings[key]};
  currentSpin=null;
  renderRoster();
  document.getElementById('spinCard').style.display='none';
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('spinBtn').textContent='\u21BA  SPIN AGAIN';
  if(Object.keys(roster).length===CAPTIONS.length){finishGame();}
}

function renderRoster(){
  var grid=document.getElementById('rosterGrid');
  grid.innerHTML='';
  CAPTIONS.forEach(function(c){
    var div=document.createElement('div');
    div.className='slot'+(c.key in roster?' filled':'');
    if(c.key in roster){
      var e=roster[c.key];
      div.innerHTML='<div class="slot-left"><div class="slot-cap">'+c.full+'</div><div class="slot-band">'+e.band+'</div><div class="slot-year">'+e.year+'</div></div><div class="slot-right"><div class="slot-rank">'+ordinal(e.rank)+' place</div><div class="slot-score">'+e.score.toFixed(3)+'</div></div>';
    } else {
      div.innerHTML='<div class="slot-left"><div class="slot-cap">'+c.full+'</div><div class="slot-empty">Empty</div></div>';
    }
    grid.appendChild(div);
  });
}

function finishGame(){
  gameOver=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinCard').style.display='none';

  var MPI=roster['MPI'].score, MPE=roster['MPE'].score;
  var VPI=roster['VPI'].score, VPE=roster['VPE'].score;
  var MGE=roster['MGE Tot'].score, VGE=roster['VGE'].score;

  var music=(MPI+MPE)/2;
  var visual=(VPI+VPE)/2;
  var totalGE=MGE+VGE;
  var total=music+visual+totalGE;

  document.getElementById('scoreBig').textContent=total.toFixed(3);

  var cards=document.getElementById('scoreCards');
  cards.innerHTML='';

  function makeCard(title,val,extraClass){
    var d=document.createElement('div');
    d.className='sc-card'+(extraClass?' '+extraClass:'');
    d.innerHTML='<div class="sc-title">'+title+'</div><div class="sc-val">'+val+'</div>';
    return d;
  }

  cards.appendChild(makeCard('Music',music.toFixed(3),''));
  cards.appendChild(makeCard('Visual',visual.toFixed(3),''));
  cards.appendChild(makeCard('Music General Effect',MGE.toFixed(3),''));
  cards.appendChild(makeCard('Visual General Effect',VGE.toFixed(3),''));
  cards.appendChild(makeCard('Total General Effect',totalGE.toFixed(3),'total-ge'));
  cards.appendChild(makeCard('Total Score',total.toFixed(3),'total-score'));

  runSimulation(total);
  document.getElementById('scoreBoard').classList.add('on');
}

function runSimulation(score){
  var years=Object.keys(PLACEMENT_DATA);
  var placeCounts={};
  var allPlaces=[];
  years.forEach(function(yr){
    var scores=PLACEMENT_DATA[yr].slice().concat([score]).sort(function(a,b){return b-a});
    var place=scores.indexOf(score)+1;
    placeCounts[place]=(placeCounts[place]||0)+1;
    allPlaces.push(place);
  });
  var places=Object.keys(placeCounts).map(Number).sort(function(a,b){return a-b});
  var total=years.length;
  var maxCt=Math.max.apply(null,Object.values(placeCounts));
  var topPlace=places.reduce(function(a,b){return placeCounts[a]>=placeCounts[b]?a:b});
  allPlaces.sort(function(a,b){return a-b});
  var median=allPlaces[Math.floor(allPlaces.length/2)];
  var minP=allPlaces[0], maxP=allPlaces[allPlaces.length-1];
  var topPct=Math.round(placeCounts[topPlace]/total*100);
  document.getElementById('simResultLbl').textContent='Most often: '+ordinal(topPlace)+' place ('+placeCounts[topPlace]+' of '+total+' years, '+topPct+'%)';
  document.getElementById('simResultSub').textContent='Median: '+ordinal(median)+' place  ·  Range: '+ordinal(minP)+' – '+ordinal(maxP)+' across all years (2000–2025)';
  var barsEl=document.getElementById('simBars');
  barsEl.innerHTML='';
  places.forEach(function(p){
    var ct=placeCounts[p];
    var pct=ct/total*100;
    var barW=ct/maxCt*100;
    var isHi=p===topPlace;
    var row=document.createElement('div');
    row.className='sim-row';
    row.innerHTML='<div class="sim-place">'+ordinal(p)+'</div><div class="sim-bar-wrap"><div class="sim-bar'+(isHi?' hi':'')+'" style="width:'+barW+'%"></div></div><div class="sim-pct">'+Math.round(pct)+'%</div>';
    barsEl.appendChild(row);
  });
}

function resetGame(){
  roster={};currentSpin=null;respinBandUsed=false;respinYearUsed=false;gameOver=false;
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('spinBtn').textContent='▶  SPIN';
  document.getElementById('spinCard').style.display='none';
  document.getElementById('idle').style.display='block';
  document.getElementById('scoreBoard').classList.remove('on');
  renderRoster();
}

renderRoster();
</script>
