<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Draft — bandScores</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
<style>
:root{--navy:#11364d;--red:#bf2a25;--blue:#4c8db8;--white:#fff;--dim:#7aa8c4;--gold:#ffd060;--green:#4ecf7a;--bg:var(--navy);--fg:var(--white);--card-bg:rgba(255,255,255,0.06);--card-border:rgba(76,141,184,0.35);--slot-bg:rgba(255,255,255,0.03);--slot-border:rgba(76,141,184,0.25);--mode-bg:rgba(255,255,255,0.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Montserrat',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body.light{--bg:#f0f4f8;--fg:#11364d;--white:#11364d;--dim:#11364d;--navy-lite:rgba(17,54,77,0.06);--card-bg:rgba(17,54,77,0.04);--card-border:rgba(17,54,77,0.2);--slot-bg:rgba(17,54,77,0.03);--slot-border:rgba(17,54,77,0.2);--mode-bg:rgba(17,54,77,0.04)}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.02) 3px,rgba(0,0,0,0.02) 4px);pointer-events:none;z-index:999}
.wrap{max-width:860px;margin:0 auto;padding:24px 18px 48px}
.hdr{text-align:center;margin-bottom:24px}
.hdr-sub{font-size:11px;font-weight:700;font-style:italic;letter-spacing:3px;color:var(--blue);text-transform:uppercase;margin-bottom:6px}
.hdr h1{font-size:clamp(20px,5vw,36px);font-weight:900;letter-spacing:4px;text-transform:uppercase;line-height:1.1}
.hdr h1 em{color:var(--red);font-style:normal}
.stripes{display:flex;gap:4px;justify-content:center;margin-top:10px}
.stripes div{height:4px;border-radius:2px}
.s1{width:80px;background:var(--red)}.s2{width:60px;background:var(--blue)}.s3{width:40px;background:rgba(17,54,77,0.15)}
.theme-toggle-wrap{text-align:right;margin-bottom:10px}
.theme-btn{background:transparent;border:1.5px solid rgba(17,54,77,0.2);border-radius:20px;padding:5px 14px;color:var(--fg);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.2s}
.theme-btn:hover{border-color:var(--blue);color:var(--blue)}
.mode-selector{background:var(--mode-bg);border:1.5px solid var(--card-border);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.mode-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);white-space:nowrap}
.mode-btns{display:flex;gap:6px}
.mode-btn{background:transparent;border:1.5px solid rgba(17,54,77,0.2);border-radius:6px;padding:6px 14px;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:.15s}
.mode-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.mode-btn:hover:not(.active){border-color:var(--blue);color:#fff}
.mode-desc{font-size:10px;color:var(--dim);font-style:italic}
.spin-btn{width:100%;background:var(--red);border:none;border-radius:10px;padding:15px;color:#fff;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.15s;margin-bottom:18px}
.spin-btn:hover:not(:disabled){background:#d4302a;transform:translateY(-1px)}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.spin-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:14px;padding:18px 20px;margin-bottom:18px;display:none}
.spin-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:8px}
.spin-band{font-weight:900;font-style:italic;font-size:clamp(16px,3.5vw,24px);line-height:1.15;margin-bottom:2px}
.spin-meta{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.norm-badge{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(76,141,184,0.25);color:var(--blue);border-radius:4px;padding:2px 6px;align-self:center}
.spin-overall{display:flex;gap:14px;align-items:baseline;margin-bottom:14px;padding:8px 12px;background:var(--mode-bg);border-radius:7px;border-left:3px solid var(--blue)}
.spin-overall-score{font-size:22px;font-weight:900;color:var(--fg)}
.spin-overall-place{font-size:13px;font-weight:700;color:var(--blue)}
.spin-overall-event{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase}
.cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cap-btn{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:9px;padding:11px 8px 9px;cursor:pointer;transition:.15s;text-align:center;font-family:'Montserrat',sans-serif}
.cap-btn:hover:not(:disabled):not(.is-filled){background:rgba(76,141,184,0.18);border-color:var(--blue)}
.cap-btn:disabled{opacity:.28;cursor:not-allowed}
.cap-btn.is-filled{border-color:rgba(191,42,37,0.35);background:rgba(191,42,37,0.05);cursor:not-allowed}
.cap-name-full{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-bottom:5px;line-height:1.3;font-style:italic}
.cap-rank-num{font-size:26px;font-weight:900;line-height:1;color:var(--fg)}
.cap-rank-num.gold{color:var(--gold)}
.cap-rank-num.green{color:var(--green)}
.cap-filled-tag{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--red);text-transform:uppercase;margin-top:3px}
.respin-row{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.respin-btn{flex:1;min-width:140px;background:transparent;border:1.5px solid rgba(17,54,77,0.2);border-radius:8px;padding:9px 10px;color:var(--fg);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
.respin-btn:hover:not(:disabled){border-color:var(--blue);background:rgba(76,141,184,0.12)}
.respin-btn:disabled{opacity:.25;cursor:not-allowed}
.rs-count{background:rgba(17,54,77,0.12);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700}
.rs-count.used{background:rgba(191,42,37,0.25);color:#ff9999}
.idle{text-align:center;padding:28px;color:var(--dim);opacity:0.6;font-size:13px;font-style:italic;border:1.5px dashed var(--slot-border);border-radius:14px;margin-bottom:18px}
.section-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
.roster-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px}
.slot{background:var(--slot-bg);border:1.5px dashed var(--slot-border);border-radius:10px;padding:12px 14px;min-height:70px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;transition:.2s}
.slot.filled{background:var(--card-bg);border-style:solid;border-color:var(--card-border)}
.slot-left{display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}
.slot-cap{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:3px}
.slot-band{font-weight:700;font-style:italic;font-size:12px;line-height:1.25}
.slot-year{font-size:11px;font-weight:700;color:var(--dim);margin-top:2px}
.slot-empty{font-size:11px;color:var(--dim);opacity:0.6;font-style:italic}
.slot-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:3px}
.slot-rank{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--blue);text-transform:uppercase;white-space:nowrap}
.slot-score{font-size:18px;font-weight:900;color:var(--fg);line-height:1}
.slot-raw{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:.3px;font-style:italic}
.score-board{display:none}
.score-board.on{display:block}
.score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc-card{background:var(--navy);border:1.5px solid var(--card-border);border-radius:11px;padding:14px 12px}
.sc-title{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-bottom:8px;text-transform:uppercase}
.sc-val{font-size:22px;font-weight:900;color:#fff;margin-bottom:8px}
.sc-raw{font-size:10px;font-weight:700;color:var(--dim);font-style:italic;margin-top:4px}
.score-raw-sub{display:block;font-size:11px;font-weight:700;color:var(--dim);font-style:italic;margin-top:4px}
.sim-card{background:var(--slot-bg);border:1.5px solid rgba(76,141,184,0.3);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.sim-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:10px}
.sim-result-lbl{font-size:13px;font-weight:700;color:var(--fg);margin-bottom:4px}
.sim-result-sub{font-size:11px;color:var(--dim);font-style:italic;margin-bottom:12px}
.sim-bars{display:flex;flex-direction:column;gap:5px}
.sim-row{display:flex;align-items:center;gap:8px}
.sim-place{font-size:11px;font-weight:700;color:var(--dim);min-width:32px;text-align:right}
.sim-bar-wrap{flex:1;height:16px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.sim-bar{height:100%;border-radius:4px;transition:width .6s ease;background:rgba(76,141,184,0.45)}
.sim-bar.hi{background:var(--red)}
.sim-pct{font-size:11px;font-weight:700;color:var(--dim);min-width:36px}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.play-again{background:var(--red);border:none;border-radius:8px;padding:10px 28px;color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.15s}
.play-again:hover{background:#d4302a}
.share-btn{background:var(--blue);border:none;border-radius:8px;padding:10px 28px;color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.15s}
.share-btn:hover{background:#3d7ca6}
.rs-penalty{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--red);margin-top:2px;font-style:italic}
body.light .hdr h1{color:var(--navy)} body.light .hdr h1 em{color:var(--red)}
body.light .spin-band{color:var(--navy)} body.light .spin-meta{color:var(--navy)}
body.light .spin-overall-score{color:var(--navy)} body.light .spin-overall-place{color:var(--navy)}
body.light .spin-overall-event{color:var(--blue)} body.light .spin-overall{background:rgba(17,54,77,0.05);border-left-color:var(--navy)}
body.light .cap-rank-num{color:var(--navy)} body.light .cap-name-full{color:var(--navy);opacity:0.6}
body.light .cap-btn{background:rgba(17,54,77,0.04);border-color:rgba(17,54,77,0.2)}
body.light .cap-btn:hover:not(:disabled):not(.is-filled){background:rgba(76,141,184,0.12);border-color:var(--blue)}
body.light .cap-btn.is-filled{background:rgba(191,42,37,0.05);border-color:rgba(191,42,37,0.3)}
body.light .slot-band{color:var(--navy)} body.light .slot-score{color:var(--navy)} body.light .slot-rank{color:var(--blue)}
body.light .respin-btn{color:var(--navy);border-color:rgba(17,54,77,0.25)}
body.light .rs-count{background:rgba(17,54,77,0.1);color:var(--navy)}
body.light .rs-count.used{background:rgba(191,42,37,0.15);color:var(--red)}
body.light .sc-card{background:var(--navy);border-color:rgba(17,54,77,0.2)}
body.light .sc-title{color:rgba(255,255,255,0.6)} body.light .sim-card{background:rgba(17,54,77,0.04);border-color:rgba(17,54,77,0.15)}
body.light .sim-title{color:var(--navy);opacity:0.7} body.light .sim-result-lbl{color:var(--navy)}
body.light .sim-result-sub{color:var(--navy);opacity:0.6} body.light .sim-place{color:var(--navy);opacity:0.6}
body.light .sim-pct{color:var(--navy);opacity:0.6} body.light .sim-bar-wrap{background:rgba(17,54,77,0.08)}
body.light .sim-bar{background:rgba(17,54,77,0.35)} body.light .sim-bar.hi{background:var(--red)}
body.light .hdr-sub{color:var(--blue)} body.light .section-lbl{color:var(--blue)} body.light .spin-lbl{color:var(--blue)}
body.light .norm-badge{background:rgba(17,54,77,0.1);color:var(--navy)} body.light .mode-desc{color:var(--navy);opacity:0.6}
@media(max-width:520px){.cap-grid{grid-template-columns:repeat(2,1fr)}.roster-grid{grid-template-columns:1fr}.score-cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="hdr-sub">bandscores presents</div>
  <h1>Caption <em>Draft</em></h1>
  <div class="stripes"><div class="s1"></div><div class="s2"></div><div class="s3"></div></div>
</div>
<div class="theme-toggle-wrap">
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9790; Dark</button>
</div>
<div class="mode-selector" id="modeSelector">
  <div class="mode-label">Mode</div>
  <div class="mode-btns">
    <button class="mode-btn active" id="modeBtnRaw" onclick="setMode('raw')">BOA Original</button>
    <button class="mode-btn" id="modeBtnNorm" onclick="setMode('norm')">BOA Normalized</button>
    <button class="mode-btn" id="modeBtnDCI" onclick="setMode('dci')">DCI</button>
  </div>
  <div class="mode-desc" id="modeDesc">BOA raw historical scores as recorded</div>
</div>
<button class="spin-btn" id="spinBtn" onclick="doSpin()">&#9654;&nbsp; SPIN</button>
<div class="spin-card" id="spinCard">
  <div class="spin-lbl">Current Spin</div>
  <div class="spin-band" id="spinBand"></div>
  <div class="spin-meta" id="spinMeta"></div>
  <div class="spin-overall" id="spinOverall"></div>
  <div class="cap-grid" id="capGrid"></div>
  <div class="respin-row">
    <button class="respin-btn" id="rsBandBtn" onclick="doRespinBand()">&#8635; New Band, Same Year <span class="rs-count" id="rsBandCt">free</span></button>
    <button class="respin-btn" id="rsYearBtn" onclick="doRespinYear()">&#8635; New Year, Same Band <span class="rs-count" id="rsYearCt">free</span></button>
  </div>
</div>
<div class="idle" id="idle">Spin to get a band &amp; year &mdash; then assign one caption to your roster</div>
<div class="section-lbl">Your Roster</div>
<div class="roster-grid" id="rosterGrid"></div>
<div class="score-board" id="scoreBoard">
  <div class="score-cards" id="scoreCards"></div>
  <div class="sim-card">
    <div class="sim-title" id="simTitle">Where would this score place at Grand Nationals Finals?</div>
    <div class="sim-result-lbl" id="simResultLbl"></div>
    <div class="sim-result-sub" id="simResultSub"></div>
    <div class="sim-bars" id="simBars"></div>
  </div>
  <div class="end-btns">
    <button class="play-again" onclick="resetGame()">Play Again</button>
    <button class="share-btn" onclick="openScoreImage()">Save Photo of Results</button>
  </div>
</div>
</div>

let DATA=DATA_RAW;

const CAPTIONS_BOA=[
  {key:'MPI',    full:'Music Performance Individual', group:'music'},
  {key:'MPE',    full:'Music Performance Ensemble',   group:'music'},
  {key:'VPI',    full:'Visual Performance Individual',group:'visual'},
  {key:'VPE',    full:'Visual Performance Ensemble',  group:'visual'},
  {key:'MGE Tot',full:'Music General Effect',         group:'mge'},
  {key:'VGE',    full:'Visual General Effect',        group:'vge'}
];
const CAPTIONS_DCI=[
  {key:'GE',   full:'General Effect',     group:'ge'},
  {key:'VP',   full:'Visual Proficiency', group:'visual'},
  {key:'VA',   full:'Visual Analysis',    group:'visual'},
  {key:'CG',   full:'Color Guard',        group:'visual'},
  {key:'BR',   full:'Music Brass',        group:'music'},

  {key:'PERC', full:'Percussion',         group:'music'}

function getCaptions(){return currentMode==='dci'?CAPTIONS_DCI:CAPTIONS_BOA;}

let roster={},currentSpin=null,respinBandCount=0,respinYearCount=0,gameOver=false,lastAssigned=null,totalPenalty=0,currentMode='raw';

var RESPIN_PENALTIES=[0,0.2,0.4,0.6];
var MAX_RESPINS=4;
function getRespinPenalty(count){return RESPIN_PENALTIES[count]||0;}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}
function rankClass(r){return r===1?'gold':r<=3?'green':'';}
function ordinal(n){var s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

function toggleTheme(){
  var isLight=document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'☀️ Light':'☺ Dark';
}

function setMode(mode){
  if(currentSpin||Object.keys(roster).length>0)return;
  currentMode=mode;
  if(mode==='dci'){DATA=DATA_DCI;PLACEMENT_DATA=PLACEMENT_DATA_DCI;}
  else if(mode==='norm'){DATA=DATA_NORM;PLACEMENT_DATA=PLACEMENT_DATA_NORM;}
  else{DATA=DATA_RAW;PLACEMENT_DATA=PLACEMENT_DATA_RAW;}
  document.getElementById('modeBtnRaw').classList.toggle('active',mode==='raw');
  document.getElementById('modeBtnNorm').classList.toggle('active',mode==='norm');
  document.getElementById('modeBtnDCI').classList.toggle('active',mode==='dci');
  var descs={raw:'BOA raw historical scores as recorded',norm:'BOA era-normalized & spread-weighted scores',dci:'DCI World Championships — raw historical scores'};
  document.getElementById('modeDesc').textContent=descs[mode]||'';
}

function doSpin(){
  if(gameOver)return;
  if(currentSpin&&lastAssigned===null){alert('Pick a caption from the current spin before spinning again.');return;}
  if(Object.keys(roster).length===0){
    document.getElementById('modeSelector').style.opacity='0.4';
    document.getElementById('modeSelector').style.pointerEvents='none';
  }
  lastAssigned=null;
  renderRoster();
  currentSpin=rand(DATA);
  renderSpin();
}

function doRespinBand(){
  if(respinBandCount>=MAX_RESPINS||!currentSpin)return;
  var penalty=getRespinPenalty(respinBandCount);
  if(lastAssigned!==null){delete roster[lastAssigned];lastAssigned=null;}
  var isDCIMode=currentMode==='dci';
  var pool=DATA.filter(function(d){return d.year===currentSpin.year&&d.band!==currentSpin.band;});
  if(!pool.length){alert('No other '+(isDCIMode?'corps':'bands')+' available for this year.');return;}
  totalPenalty=Math.round((totalPenalty+penalty)*10)/10;
  currentSpin=rand(pool);
  respinBandCount++;
  renderSpin();
}

function doRespinYear(){
  if(respinYearCount>=MAX_RESPINS||!currentSpin)return;
  var penalty=getRespinPenalty(respinYearCount);
  if(lastAssigned!==null){delete roster[lastAssigned];lastAssigned=null;}
  var pool=DATA.filter(function(d){return d.band===currentSpin.band&&d.year!==currentSpin.year;});
  if(!pool.length){alert('No other years available for this band/corps.');return;}
  totalPenalty=Math.round((totalPenalty+penalty)*10)/10;
  currentSpin=rand(pool);
  respinYearCount++;
  renderSpin();
}

function renderSpin(){
  if(!currentSpin)return;
  document.getElementById('idle').style.display='none';
  document.getElementById('spinCard').style.display='block';
  document.getElementById('spinBtn').textContent='↺  SPIN AGAIN';
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinBand').textContent=currentSpin.year+' · '+currentSpin.band;
  document.getElementById('spinMeta').textContent='Class: '+currentSpin.class;
  var displayTotal=currentMode==='norm'?currentSpin.total_norm:currentSpin.total;
  var placeStr=currentSpin.place?ordinal(currentSpin.place)+' place':'—';
  document.getElementById('spinOverall').innerHTML=
    '<span class="spin-overall-score">'+displayTotal.toFixed(3)+'</span>'+
    '<span class="spin-overall-place">'+placeStr+'</span>'+
    '<span class="spin-overall-event">'+currentSpin.round+'</span>'+
    (currentMode==='norm'?'<span class="norm-badge">normalized</span>':'');
  var grid=document.getElementById('capGrid');
  grid.innerHTML='';
  getCaptions().forEach(function(c){
    var rank=currentSpin.rankings[c.key];
    var filled=(c.key in roster)&&(c.key!==lastAssigned);
    var btn=document.createElement('button');
    btn.className='cap-btn'+(filled?' is-filled':'');
    btn.disabled=filled;
    var rc=filled?'':rankClass(rank);
    btn.innerHTML='<div class="cap-name-full">'+c.full+'</div><div class="cap-rank-num '+rc+'">'+rank+'</div>'+(filled?'<div class="cap-filled-tag">Filled</div>':'');
    if(!filled){(function(k){btn.onclick=function(){assignCap(k);};})(c.key);}
    grid.appendChild(btn);
  });
  var isDCIMode=currentMode==='dci';
  document.getElementById('rsBandBtn').childNodes[0].textContent='↻ '+(isDCIMode?'New Corps, Same Year':'New Band, Same Year')+' ';
  document.getElementById('rsYearBtn').childNodes[0].textContent='↻ '+(isDCIMode?'New Year, Same Corps':'New Year, Same Band')+' ';
  var bandExhausted=respinBandCount>=MAX_RESPINS;
  var yearExhausted=respinYearCount>=MAX_RESPINS;
  document.getElementById('rsBandBtn').disabled=bandExhausted;
  document.getElementById('rsYearBtn').disabled=yearExhausted;
  var rbCt=document.getElementById('rsBandCt');
  var bandLeft=MAX_RESPINS-respinBandCount;
  var bandNextPenalty=getRespinPenalty(respinBandCount);
  rbCt.textContent=bandExhausted?'used up':(bandNextPenalty>0?'-'+bandNextPenalty.toFixed(1)+' pts · '+bandLeft+' left':'✓ free · '+bandLeft+' left');
  rbCt.className='rs-count'+(bandExhausted?' used':(bandNextPenalty>0?' used':''));
  var ryCt=document.getElementById('rsYearCt');
  var yearLeft=MAX_RESPINS-respinYearCount;
  var yearNextPenalty=getRespinPenalty(respinYearCount);
  ryCt.textContent=yearExhausted?'used up':(yearNextPenalty>0?'-'+yearNextPenalty.toFixed(1)+' pts · '+yearLeft+' left':'✓ free · '+yearLeft+' left');
  ryCt.className='rs-count'+(yearExhausted?' used':(yearNextPenalty>0?' used':''));
}

function assignCap(key){
  if(!currentSpin||key in roster)return;
  if(lastAssigned!==null){delete roster[lastAssigned];}
  var rawRec=DATA_RAW.find(function(d){return d.band===currentSpin.band&&d.year===currentSpin.year;});
  var rawScore=rawRec?rawRec.scores[key]:null;
  roster[key]={band:currentSpin.band,year:currentSpin.year,score:currentSpin.scores[key],rank:currentSpin.rankings[key],rawScore:rawScore};
  lastAssigned=key;
  renderRoster();
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('spinBtn').textContent='↺  SPIN AGAIN';
  if(Object.keys(roster).length===getCaptions().length){finishGame();}
}

function renderRoster(){
  var grid=document.getElementById('rosterGrid');
  grid.innerHTML='';
  getCaptions().forEach(function(c){
    var div=document.createElement('div');
    div.className='slot'+(c.key in roster?' filled':'');
    if(c.key in roster){
      var e=roster[c.key];
      var scoreHtml='';
      var rawHtml='';
      if(lastAssigned!==c.key){
        scoreHtml='<div class="slot-score">'+e.score.toFixed(3)+'</div>';
        rawHtml=currentMode==='norm'&&e.rawScore!==null?'<div class="slot-raw">Original score: '+e.rawScore.toFixed(3)+'</div>':'';
      }
      div.innerHTML='<div class="slot-left"><div class="slot-cap">'+c.full+'</div><div class="slot-band">'+e.band+'</div><div class="slot-year">'+e.year+'</div></div><div class="slot-right"><div class="slot-rank">'+ordinal(e.rank)+' place</div>'+scoreHtml+rawHtml+'</div>';
    } else {
      div.innerHTML='<div class="slot-left"><div class="slot-cap">'+c.full+'</div><div class="slot-empty">Empty</div></div>';
    }
    grid.appendChild(div);
  });
}

function finishGame(){
  gameOver=true;
  lastAssigned=null;
  renderRoster();
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinCard').style.display='none';
  var isNorm=currentMode==='norm';
  var isDCI=currentMode==='dci';
  var music,visual,totalGE,total;
  if(isDCI){
    var GE=roster['GE'].score,VP=roster['VP'].score,VA=roster['VA'].score,CG=roster['CG'].score;
    var BR=roster['BR'].score,MA=roster['MA'].score,PERC=roster['PERC'].score;
    music=(BR+MA+PERC)/2; visual=(VP+VA+CG)/2; totalGE=GE; total=music+visual+totalGE;
  } else {
    var MPI=roster['MPI'].score,MPE=roster['MPE'].score,VPI=roster['VPI'].score,VPE=roster['VPE'].score;
    var MGE=roster['MGE Tot'].score,VGE=roster['VGE'].score;
    music=(MPI+MPE)/2; visual=(VPI+VPE)/2; totalGE=MGE+VGE; total=music+visual+totalGE;
  }
  function getRawScore(band,year,key){
    var rec=DATA_RAW.find(function(d){return d.band===band&&d.year===year;});
    return rec?rec.scores[key]:null;
  }
  var finalScore=Math.round((total-totalPenalty)*1000)/1000;
  var rawMusic=null,rawVisual=null,rawTotalGE=null,rawTotal=null,rawMGE=null,rawVGE=null;
  if(isNorm){
    var rawMPI=getRawScore(roster['MPI'].band,roster['MPI'].year,'MPI');
    var rawMPE=getRawScore(roster['MPE'].band,roster['MPE'].year,'MPE');
    var rawVPI=getRawScore(roster['VPI'].band,roster['VPI'].year,'VPI');
    var rawVPE=getRawScore(roster['VPE'].band,roster['VPE'].year,'VPE');
    rawMGE=getRawScore(roster['MGE Tot'].band,roster['MGE Tot'].year,'MGE Tot');
    rawVGE=getRawScore(roster['VGE'].band,roster['VGE'].year,'VGE');
    rawMusic=(rawMPI!==null&&rawMPE!==null)?(rawMPI+rawMPE)/2:null;
    rawVisual=(rawVPI!==null&&rawVPE!==null)?(rawVPI+rawVPE)/2:null;
    rawTotalGE=(rawMGE!==null&&rawVGE!==null)?rawMGE+rawVGE:null;
    rawTotal=(rawMusic!==null&&rawVisual!==null&&rawTotalGE!==null)?rawMusic+rawVisual+rawTotalGE:null;
  }
  var cards=document.getElementById('scoreCards');
  cards.innerHTML='';
  function makeCard(title,val,rawVal){
    var d=document.createElement('div');
    d.className='sc-card';
    var rawHtml=isNorm&&rawVal!==null?'<div class="sc-raw">Score without normalization/weight: '+rawVal.toFixed(3)+'</div>':'';
    d.innerHTML='<div class="sc-title">'+title+'</div><div class="sc-val">'+val+'</div>'+rawHtml;
    return d;
  }
  cards.appendChild(makeCard('Final Score',finalScore.toFixed(3),null));
  cards.appendChild(makeCard('Penalty',totalPenalty>0?'-'+totalPenalty.toFixed(1):'0.0',null));
  cards.appendChild(makeCard('Subtotal',total.toFixed(3),rawTotal));
  cards.appendChild(makeCard('Music',music.toFixed(3),rawMusic));
  cards.appendChild(makeCard('Visual',visual.toFixed(3),rawVisual));
  if(isDCI){
    cards.appendChild(makeCard('General Effect',totalGE.toFixed(3),null));
  } else {
    cards.appendChild(makeCard('Music General Effect',roster['MGE Tot'].score.toFixed(3),rawMGE));
    cards.appendChild(makeCard('Visual General Effect',roster['VGE'].score.toFixed(3),rawVGE));
    cards.appendChild(makeCard('Total General Effect',totalGE.toFixed(3),rawTotalGE));
  }
  cards.style.gridTemplateColumns=isDCI?'repeat(3,1fr)':'repeat(4,1fr)';
  runSimulation(finalScore);
  document.getElementById('scoreBoard').classList.add('on');
}

function runSimulation(score){
  var years=Object.keys(PLACEMENT_DATA);
  var placeCounts={},allPlaces=[];
  years.forEach(function(yr){
    var scores=PLACEMENT_DATA[yr].slice().concat([score]).sort(function(a,b){return b-a;});
    var place=scores.indexOf(score)+1;
    placeCounts[place]=(placeCounts[place]||0)+1;
    allPlaces.push(place);
  });
  var places=Object.keys(placeCounts).map(Number).sort(function(a,b){return a-b;});
  var total=years.length;
  var maxCt=Math.max.apply(null,Object.values(placeCounts));
  var topPlace=places.reduce(function(a,b){return placeCounts[a]>=placeCounts[b]?a:b;});
  allPlaces.sort(function(a,b){return a-b;});
  var median=allPlaces[Math.floor(allPlaces.length/2)];
  var minP=allPlaces[0],maxP=allPlaces[allPlaces.length-1];
  var topPct=Math.round(placeCounts[topPlace]/total*100);
  var eventName=currentMode==='dci'?'DCI World Championship Finals':'Grand Nationals Finals';
  document.getElementById('simTitle').textContent='Where would this score place at '+eventName+'?';
  document.getElementById('simResultLbl').textContent='Most often: '+ordinal(topPlace)+' place ('+placeCounts[topPlace]+' of '+total+' years, '+topPct+'%)';
  document.getElementById('simResultSub').textContent='Median: '+ordinal(median)+' place  ·  Range: '+ordinal(minP)+' – '+ordinal(maxP)+' across all years';
  var barsEl=document.getElementById('simBars');
  barsEl.innerHTML='';
  places.forEach(function(p){
    var ct=placeCounts[p],pct=ct/total*100,barW=ct/maxCt*100,isHi=p===topPlace;
    var row=document.createElement('div');
    row.className='sim-row';
    row.innerHTML='<div class="sim-place">'+ordinal(p)+'</div><div class="sim-bar-wrap"><div class="sim-bar'+(isHi?' hi':'')+'" style="width:'+barW+'%"></div></div><div class="sim-pct">'+Math.round(pct)+'%</div>';
    barsEl.appendChild(row);
  });
}

function resetGame(){
  roster={};currentSpin=null;respinBandCount=0;respinYearCount=0;gameOver=false;totalPenalty=0;lastAssigned=null;
  if(currentMode==='dci'){DATA=DATA_DCI;PLACEMENT_DATA=PLACEMENT_DATA_DCI;}
  else if(currentMode==='norm'){DATA=DATA_NORM;PLACEMENT_DATA=PLACEMENT_DATA_NORM;}
  else{DATA=DATA_RAW;PLACEMENT_DATA=PLACEMENT_DATA_RAW;}
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('spinBtn').textContent='▶  SPIN';
  document.getElementById('spinCard').style.display='none';
  document.getElementById('idle').style.display='block';
  document.getElementById('scoreBoard').classList.remove('on');
  document.getElementById('modeSelector').style.opacity='1';
  document.getElementById('modeSelector').style.pointerEvents='auto';
  renderRoster();
}


function openScoreImage(){
  var isDCI=currentMode==='dci';
  var captions=getCaptions();
  var cards=document.querySelectorAll('#scoreCards .sc-card');
  var finalScore=cards.length?cards[0].querySelector('.sc-val').textContent:'\u2014';
  var gameName=isDCI?'DCI Caption Draft':'BOA Caption Draft';

  // Collect roster entries
  var entries=[];
  captions.forEach(function(c){
    if(c.key in roster){var e=roster[c.key];entries.push({cap:c.full,band:e.band,year:String(e.year)});}
  });

  // Canvas dimensions
  var W=700,pad=40;
  var headerH=100,headlineH=100,cardH=80,cardGap=10,cardCols=2;
  var rows=Math.ceil(entries.length/2);
  var gridH=rows*(cardH+cardGap)-cardGap;
  var footerH=50;
  var H=pad+headerH+headlineH+gridH+footerH+pad;

  var canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');

  // Background gradient
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0f3448');
  bg.addColorStop(0.5,'#11364d');
  bg.addColorStop(1,'#142f44');
  ctx.fillStyle=bg;
  roundRect(ctx,0,0,W,H,20);
  ctx.fill();

  // Top stripe gradient
  var stripe=ctx.createLinearGradient(0,0,W,0);
  stripe.addColorStop(0,'#bf2a25');
  stripe.addColorStop(1,'#4c8db8');
  ctx.fillStyle=stripe;
  ctx.fillRect(0,0,W,4);

  var y=pad;

  // Brand header
  ctx.font='900 italic 20px Montserrat,sans-serif';
  ctx.fillStyle='#ffffff';
  ctx.fillText('bandscores',pad,y+22);
  var bsW=ctx.measureText('bandscores').width;
  ctx.font='700 12px Montserrat,sans-serif';
  ctx.fillStyle='#4c8db8';
  ctx.fillText(gameName.toUpperCase(),pad+bsW+12,y+20);
  y+=headerH-30;

  // Headline
  ctx.fillStyle='#ffffff';
  var headline='I scored ';
  var scoreStr=finalScore;
  var rest=' in '+gameName+'!';
  var line2='Think you can beat me?';
  ctx.font='900 28px Montserrat,sans-serif';
  ctx.fillText(headline,pad,y);
  var hw=ctx.measureText(headline).width;
  ctx.fillStyle='#bf2a25';
  ctx.fillText(scoreStr,pad+hw,y);
  var sw=ctx.measureText(scoreStr).width;
  ctx.fillStyle='#ffffff';
  ctx.fillText(rest,pad+hw+sw,y);
  y+=38;
  ctx.fillText(line2,pad,y);
  y+=headlineH-10;

  // Roster cards
  var cardW=(W-pad*2-cardGap)/2;
  entries.forEach(function(e,i){
    var col=i%2, row=Math.floor(i/2);
    var cx=pad+col*(cardW+cardGap);
    var cy=y+row*(cardH+cardGap);
    // Card bg
    ctx.fillStyle='rgba(255,255,255,0.07)';
    roundRect(ctx,cx,cy,cardW,cardH,10);
    ctx.fill();
    // Caption label
    ctx.font='700 10px Montserrat,sans-serif';
    ctx.fillStyle='#4c8db8';
    ctx.fillText(e.cap.toUpperCase(),cx+14,cy+20);
    // Band name
    ctx.font='900 italic 15px Montserrat,sans-serif';
    ctx.fillStyle='#ffffff';
    ctx.fillText(e.band,cx+14,cy+42);
    // Year
    ctx.font='700 13px Montserrat,sans-serif';
    ctx.fillStyle='#7aa8c4';
    ctx.fillText(e.year,cx+14,cy+62);
  });

  y+=gridH+20;

  // Footer
  ctx.font='700 11px Montserrat,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.25)';
  var footTxt='bandscores.net';
  ctx.fillText(footTxt,W-pad-ctx.measureText(footTxt).width,y+20);

  // Open as image in new tab
  var imgURL=canvas.toDataURL('image/png');
  var win=window.open('','_blank');
  win.document.write('<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{margin:0;padding:0;background:#0d2b3e}img{max-width:100%;display:block;margin:0 auto}</style></head><body><img src="'+imgURL+'"/></body></html>');
  win.document.close();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}


renderRoster();
</script>
